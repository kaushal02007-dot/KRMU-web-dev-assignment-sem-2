<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
   * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f242e, #044b63, #589bb7);
    padding: 20px;
    color: #fff;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

.parent-card {
    display: flex;
    gap: 20px;
}

/* Card styling */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.2);
}

/* Input section */
.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Button */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #ff775f;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #ff5e3a;
}

/* Weather items */
.weather-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin: 6px 0;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
}

/* History buttons */
.history button {
    margin: 5px;
    padding: 6px 12px;
    border-radius: 20px;
    background: #00c9ff;
}

.history button:hover {
    background: #009ec3;
}

/* Responsive */
@media (max-width: 700px) {
    .parent-card {
        flex-direction: column;
    }
}
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>

                <!-- Use my location BUTTON -->
                <br>
                <button onclick="getLocationWeather()">📍 Use My Location</button>

                <br><br>

                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = "3af0c468e41a287c0cfe1fbcc3c0b340";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            return await res.json();
        }

        /* ---------- LOCATION WEATHER (I used the browser’s Geolocation API to get user coordinates and fetch weather based on latitude and longitude.) ---------- */
        function getLocationWeather() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                const res = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );

                const data = await res.json();
                renderWeather(data);

                saveHistory(data.name);   // optional but nice
                showHistory();
            });
        }

        /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory"));

            if (!history) {
                history = [];
            }

            history.push(city);

            localStorage.setItem("weatherHistory", JSON.stringify(history));
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            let history = JSON.parse(localStorage.getItem("weatherHistory"));

            if (!history) {
                history = [];
            }

            historyBox.innerHTML = "";

            history.forEach(city => {
                let btn = document.createElement("button");
                btn.innerText = city;

                btn.onclick = function () {
                    search(city);
                };

                historyBox.appendChild(btn);
            });
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);

                saveHistory(data.name);
                showHistory();

            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }

        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });

        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>

</body>
</html>
